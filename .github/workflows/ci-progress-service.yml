name: CI — Progress Service

on:
  push:
    branches: 
      - develop
      - main
      - feature/ci-progress-service
    #paths:
      #- "services/progress-service/**"
      #- ".github/workflows/ci-progress-service.yml"
      #- ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      - develop
      - main
      # - feature/ci-progress-service
    # paths:
      #- "services/progress-service/**"
      #- ".github/workflows/ci-progress-service.yml"
      #- ".github/workflows/_ci-template.yml"
      #

# give the workflow permission to write to the repository contents
permissions:
  contents: write


jobs:
  ci:
    uses: fitforge101/fitforge-shared/.github/workflows/_ci-template.yml@feature/templates
    with:
      service-name: progress-service
      service-path: .
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit

  update-chart:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Calculate newly built image tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            git fetch --tags
            TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v1.0.0")
            echo "new_tag=$TAG" >> $GITHUB_ENV
          else
            echo "new_tag=dev-${{ github.sha }}" >> $GITHUB_ENV
          fi

      - name: Dynamically Update Helm values.yaml
        run: |
          sed -i "s/^[[:space:]]*tag:.*/  tag: \"${{ env.new_tag }}\"/" chart/values.yaml

      - name: Git Auto-Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/values.yaml
          
          # Only commit if there are actual diffs
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automatically update helm chart image tag to ${{ env.new_tag }} [skip ci]" && git push)
