name: CI — Progress Service

on:
  push:
    branches: 
      - develop
      - main
      - feature/ci-progress-service
    #paths:
      #- "services/progress-service/**"
      #- ".github/workflows/ci-progress-service.yml"
      #- ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      - develop
      - main
      # - feature/ci-progress-service
    # paths:
      #- "services/progress-service/**"
      #- ".github/workflows/ci-progress-service.yml"
      #- ".github/workflows/_ci-template.yml"
      #

# give the workflow permission to write to the repository contents
permissions:
  contents: write


jobs:
  ci:
    uses: fitforge101/fitforge-shared/.github/workflows/_ci-template.yml@features/templates
    with:
      service-name: progress-service
      service-path: .
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit
