name: CI/CD — Progress Service

on:
  push:
    branches:
      - develop
      - main
      - feature/ci-progress-service
  pull_request:
    branches:
      - develop
      - main
      #- feature/ci-progress-service

permissions:
  contents: write
  id-token: write

jobs:
  sast:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  # ─── SCA (Snyk) ───
  sca:
    needs: [sast]
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: progress-service
      service-path: .
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ─── Notify: Snyk Criticals ───
  notify-snyk:
    needs: [sca]
    if: needs.sca.outputs.critical-found == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Snyk: Critical Vulnerabilities in progress-service"
      body: "Critical/High vulnerabilities found in progress-service dependencies."
      service-name: progress-service
      artifact-name: snyk-report-progress-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Temp Docker Build + Trivy Scan ───
  build:
    needs: [sast, sca]
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: progress-service
      service-path: .

  # ─── Notify: Trivy Criticals ───
  notify-trivy:
    needs: [build]
    if: needs.build.outputs.trivy-critical == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Trivy: Critical Vulnerabilities in progress-service"
      body: "CRITICAL vulnerabilities found in progress-service Docker image."
      service-name: progress-service
      artifact-name: trivy-progress-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Publish Docker Image (Tag + Build + Push) ───
  publish:
    if: github.event_name == 'push'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-publish.yml@v2.0.0
    with:
      service-name: progress-service
      service-path: .
      environment: ${{ github.ref_name }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ── Production CD Gate───────────────────────────────────────────────────────
  prod-approval-gate:
    needs: [publish]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (github.ref_name == 'main' || github.ref_name == 'feature/ci-progress-service') &&
      needs.publish.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved — proceeding to deploy progress-service to Production
        run: echo "Production deployment approved for tag ${{ needs.publish.outputs.image-tag }}"

  # ──ud GitHub Native CD — deploy directly to prod cluster via OIDC ──────────────
  deploy-to-prod:
    name: Deploy progress-service to prod cluster
    needs: [prod-approval-gate, publish]
    if: |
      always() &&
      needs.prod-approval-gate.result == 'success'
    runs-on: self-hosted
    permissions:
      id-token: write
      contents: read
    steps:

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Request GitHub OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=kubernetes" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure kubectl (OIDC kubeconfig)
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt
          kubectl config set-cluster prod-cluster \
            --server=${{ secrets.K8S_API_SERVER }} \
            --certificate-authority=ca.crt \
            --embed-certs=true

          kubectl config set-credentials github-actions-oidc \
            --token="${{ steps.oidc.outputs.token }}"

          kubectl config set-context prod \
            --cluster=prod-cluster \
            --user=github-actions-oidc

          kubectl config use-context prod

      - name: Deploy new image to prod
        run: |
          TAG="${{ needs.publish.outputs.image-tag }}"
          IMAGE="fitforge101/fitforge-prog-service:${TAG}"
          echo "Deploying image: ${IMAGE}"

          # Target the native Kubernetes deployment directly
          kubectl set image deployment/progress-service \
            server="${IMAGE}" \
            -n fitforge-env

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/progress-service \
            -n fitforge-env \
            --timeout=5m

      - name: Show final pod state
        if: always()
        run: |
          kubectl get pods \
            -n fitforge-env \
            -l app=progress-service \
            -o wide
