---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-progress-service-deployer
  namespace: fitforge-env
rules:
  # Broadened permissions to ensure kubectl  commands don't fail initial broad API queries
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
    
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-progress-service-deployer-binding
  namespace: fitforge-env
subjects:
  - kind: User
    name: "github:repo:fitforge101/fitforge-prog-service:ref:refs/heads/main"
  - kind: User
    name: "github:repo:fitforge101/fitforge-prog-service:ref:refs/heads/feature/ci-progress-service"
roleRef:
  kind: Role
  name: github-actions-progress-service-deployer
  apiGroup: rbac.authorization.k8s.io
